services:
  db:
    image: postgres:16
    env_file:
      - db.env

  migrations:
    build:
      context: ../src/go-api
      target: devImage
    image: api-image
    restart: on-failure
    command: "/app/registrations_api migrate"
    env_file:
      - api.env
    depends_on:
      - db

  api:
    build:
      context: ../src/go-api
      target: devImage
    image: api-image
    env_file:
      - api.env
    volumes:
      - ../src/go-api:/src
      - ../templates:/templates
    command: "/app/registrations_api"
    ports:
      - "127.0.0.1:48080:5000"
    depends_on:
      - migrations

  fe:
    build:
      context: ../admin
    ports:
      - "127.0.0.1:48081:80"
    volumes:
      - ./fe-nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
